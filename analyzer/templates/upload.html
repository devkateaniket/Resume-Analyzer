<h2>Upload Resume</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    Name:<br>
    <input type="text" name="name"><br><br>

    Email:<br>
    <input type="email" name="email"><br><br>

    Resume:<br>
    <input type="file" name="resume"><br><br>

    <button type="submit">Upload</button>

</form>
{% comment %} ------------------------------------------------------------------- {% endcomment %}
